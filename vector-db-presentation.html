            { name: "Titanic", vector: [4, 9, 2], genre: "Romance/Drama", description: "Epic romance on doomed ship" },
            { name: "John Wick", vector: [10, 1, 2], genre: "Action", description: "Stylized action revenge story" },

        // Utility Functions
        function calculateSimilarity(query, item) {
            const euclidean = Math.sqrt(
                query.reduce((sum, val, i) => sum + Math.pow(val - item.vector[i], 2), 0)
            );
            
            const dotProduct = query.reduce((sum, val, i) => sum + val * item.vector[i], 0);
            const queryMagnitude = Math.sqrt(query.reduce((sum, val) => sum + val * val, 0));
            const itemMagnitude = Math.sqrt(item.vector.reduce((sum, val) => sum + val * val, 0));
            const cosine = dotProduct / (queryMagnitude * itemMagnitude);
            
            return { euclidean, cosine };
        }

        function getSortedResults() {
            return movies.map(movie => ({
                ...movie,
                ...calculateSimilarity(demoQuery, movie)
            })).sort((a, b) => {
                if (selectedMetric === 'euclidean') return a.euclidean - b.euclidean;
                if (selectedMetric === 'cosine') return b.cosine - a.cosine;
                return a.euclidean - b.euclidean;
            });
        }

                                                </div>

            gridXY.position.set(5, 0, 5);

            gridXZ.rotateX(Math.PI / 2);

            // Axis labels

            // Create text sprites for axis labels
            function createTextSprite(text, color = 0x000000) {
                const canvas = document.createElement('canvas');
                const context = canvas.getContext('2d');
                const fontSize = 32;
                
                context.font = `${fontSize}px Arial`;
                const textWidth = context.measureText(text).width;
                
                canvas.width = textWidth;
                canvas.height = fontSize * 1.2;
                
                context.font = `${fontSize}px Arial`;
                context.fillStyle = `#${color.toString(16).padStart(6, '0')}`;
                context.fillText(text, 0, fontSize);
                
                const texture = new THREE.CanvasTexture(canvas);
                const spriteMaterial = new THREE.SpriteMaterial({ map: texture });
                const sprite = new THREE.Sprite(spriteMaterial);
                
                const scale = 2;
                sprite.scale.set(scale * textWidth / fontSize, scale, 1);
                
                return sprite;
            }

            ];

            // Create 3D points
            movies3D.forEach((movie, index) => {

                // Draw lines from origin to point
                const lineGeometry = new THREE.BufferGeometry().setFromPoints([
                    new THREE.Vector3(0, 0, 0),

                ]);
                const lineMaterial = new THREE.LineBasicMaterial({ 
                    color: movie.color, 
                    transparent: true,

                const line = new THREE.Line(lineGeometry, lineMaterial);

            // Add distance line between Query and La La Land

            const laLaPos = new THREE.Vector3(2, 8, 7);
            const distanceGeometry = new THREE.BufferGeometry().setFromPoints([queryPos, laLaPos]);
            const distanceMaterial = new THREE.LineDashedMaterial({ 
                color: 0xff0000, 
                dashSize: 0.3, 
                gapSize: 0.2,
                transparent: true,
                opacity: 0.8,
                linewidth: 3
            });
            const distanceLine = new THREE.Line(distanceGeometry, distanceMaterial);
            distanceLine.computeLineDistances();
            distanceLine.userData = { isDistanceLine: true };
            scene3D.add(distanceLine);

            // Mouse controls (simple implementation)
            let mouseDown = false;
            let mouseX = 0;
            let mouseY = 0;
            let targetRotationX = 0;
            let targetRotationY = 0;
            let currentRotationX = 0;
            let currentRotationY = 0;

            function onMouseDown(event) {
                mouseDown = true;
                mouseX = event.clientX;
                mouseY = event.clientY;
            }

            function onMouseMove(event) {
                if (!mouseDown) return;
                const deltaX = event.clientX - mouseX;
                const deltaY = event.clientY - mouseY;
                targetRotationY += deltaX * 0.01;
                targetRotationX += deltaY * 0.01;
                mouseX = event.clientX;
                mouseY = event.clientY;
            }

            function onMouseUp() {
                mouseDown = false;
            }

            function onWheel(event) {
                const scale = event.deltaY > 0 ? 1.1 : 0.9;
                camera3D.position.multiplyScalar(scale);
                event.preventDefault();
            }

            renderer3D.domElement.addEventListener('mousedown', onMouseDown);
            renderer3D.domElement.addEventListener('mousemove', onMouseMove);
            renderer3D.domElement.addEventListener('mouseup', onMouseUp);
            renderer3D.domElement.addEventListener('wheel', onWheel);

            // Animation loop
            function animate() {
                animationId = requestAnimationFrame(animate);
                
                // Smooth camera rotation
                currentRotationX += (targetRotationX - currentRotationX) * 0.1;
                currentRotationY += (targetRotationY - currentRotationY) * 0.1;
                
                // Apply rotation to camera around scene center
                const radius = camera3D.position.length();
                camera3D.position.x = radius * Math.sin(currentRotationY) * Math.cos(currentRotationX);
                camera3D.position.y = radius * Math.sin(currentRotationX);
                camera3D.position.z = radius * Math.cos(currentRotationY) * Math.cos(currentRotationX);
                camera3D.lookAt(5, 5, 5); // Look at center of coordinate system
                
                // Gentle rotation animation for movie points
                scene3D.children.forEach((child, index) => {
                    if (child.geometry && (child.geometry.type === 'SphereGeometry' || child.geometry.type === 'ConeGeometry')) {
                        child.rotation.y += 0.005;
                    }
                });
                
                renderer3D.render(scene3D, camera3D);
            }
            
            animate();

            function handleResize() {
                if (camera3D && renderer3D && container) {
                    camera3D.aspect = container.clientWidth / container.clientHeight;
                    camera3D.updateProjectionMatrix();

                }
            }
            
            window.addEventListener('resize', handleResize);
        }

        // Visualization Query Update Function
        function updateVisualizationQuery() {
            const action = parseFloat(document.getElementById('vis-action')?.value || 2.3);
            const romance = parseFloat(document.getElementById('vis-romance')?.value || 8.3);
            const comedy = parseFloat(document.getElementById('vis-comedy')?.value || 6.8);
            
            // Use 2D or 3D vector based on current view
            if (show3D) {
                visualizationQuery = [action, romance, comedy];
            } else {
                // For 2D, only use action and romance dimensions
                visualizationQuery = [action, romance];
            }
            
            // Update display values
            if (document.getElementById('vis-action-val')) document.getElementById('vis-action-val').textContent = action.toFixed(1);
            if (document.getElementById('vis-romance-val')) document.getElementById('vis-romance-val').textContent = romance.toFixed(1);
            if (document.getElementById('vis-comedy-val')) document.getElementById('vis-comedy-val').textContent = comedy.toFixed(1);
            
            // Calculate and display similarities
            const movieData = [
                { name: 'Titanic', vector: [4, 9, 5] },
                { name: 'Avengers', vector: [9, 2, 3] },
                { name: 'Deadpool', vector: [6, 6, 9] },
                { name: 'La La Land', vector: [2, 8, 7] }
            ];
            
            const similarities = movieData.map(movie => {
                // Use only the relevant dimensions based on current view
                const movieVector = show3D ? movie.vector : movie.vector.slice(0, 2);
                const euclidean = Math.sqrt(
                    visualizationQuery.reduce((sum, val, i) => sum + Math.pow(val - movieVector[i], 2), 0)
                );
                return { ...movie, distance: euclidean };
            }).sort((a, b) => a.distance - b.distance);
            
            const resultsContainer = document.getElementById('vis-similarity-results');
            if (resultsContainer) {
                resultsContainer.innerHTML = similarities.map((movie, i) => `
                    <div class="flex justify-between items-center">
                        <span class="${i === 0 ? 'font-bold text-green-600' : ''}">
                            ${i + 1}. ${movie.name}
                        </span>
                        <span class="text-gray-500 text-xs">
                            d=${movie.distance.toFixed(2)}
                        </span>
                    </div>
                `).join('');
            }
            
            // Update 3D scene if active
            if (show3D && scene3D) {
                updateScene3D();
            }
            
            // Update 2D visualization if active
            if (!show3D) {
                update2DVisualization();
                
                // Update 2D distance line to closest movie
                const closestMovie = similarities[0];
                const distanceLine = document.getElementById('distance-line-2d');
                if (distanceLine && closestMovie) {
                    const moviePos = getMoviePosition(closestMovie.name);
                    if (moviePos) {
                        distanceLine.setAttribute('x1', 40 + visualizationQuery[0] * 34);
                        distanceLine.setAttribute('y1', 310 - visualizationQuery[1] * 28);
                        distanceLine.setAttribute('x2', moviePos.x);
                        distanceLine.setAttribute('y2', moviePos.y);
                    }
                }
            }
        }
        
        function getMoviePosition(movieName) {

            const positions = {

                'Avengers': { x: 40 + 9 * 34, y: 310 - 2 * 28 },
                'Deadpool': { x: 40 + 6 * 34, y: 310 - 6 * 28 },
                'La La Land': { x: 40 + 2 * 34, y: 310 - 8 * 28 }
            };
            return positions[movieName];
        }
        
        function updateScene3D() {
            if (!scene3D) return;
            
            // Find and update query-related objects
            const objectsToUpdate = [];
            scene3D.traverse((child) => {
                if (child.userData) {
                    if (child.userData.isQuery || child.userData.isQueryGlow) {
                        objectsToUpdate.push({ type: 'position', object: child });
                    } else if (child.userData.isQueryLabel) {
                        objectsToUpdate.push({ type: 'label', object: child });
                    } else if (child.userData.isDistanceLine) {
                        objectsToUpdate.push({ type: 'line', object: child });
                    }
                }
            });
            
            // Apply updates
            objectsToUpdate.forEach(({ type, object }) => {
                try {
                    const queryZ = visualizationQuery[2] || 6.8; // Use default comedy value if not in 3D mode
                    
                    if (type === 'position') {
                        object.position.set(visualizationQuery[0], visualizationQuery[1], queryZ);
                    } else if (type === 'label') {
                        object.position.set(
                            visualizationQuery[0] + 1,
                            visualizationQuery[1] + 1,
                            queryZ
                        );
                    } else if (type === 'line') {
                        // Update distance line to closest movie
                        const queryPos = new THREE.Vector3(visualizationQuery[0], visualizationQuery[1], queryZ);
                        const laLaPos = new THREE.Vector3(2, 8, 7);
                        
                        // Dispose old geometry and create new one
                        if (object.geometry) {
                            object.geometry.dispose();
                        }
                        object.geometry = new THREE.BufferGeometry().setFromPoints([queryPos, laLaPos]);
                        object.computeLineDistances();
                    }
                } catch (error) {
                    console.warn('Error updating 3D object:', error);
                }
            });
        }

        // Cleanup function for 3D scene when leaving slide
        function cleanup3DScene() {
            if (animationId) {
                cancelAnimationFrame(animationId);
                animationId = null;
            }
            if (renderer3D) {
                const container = document.getElementById('threejs-container');
                if (container && renderer3D.domElement && container.contains(renderer3D.domElement)) {
                    container.removeChild(renderer3D.domElement);
                }
                renderer3D.dispose();
                renderer3D = null;
            }
            if (scene3D) {
                // Clean up scene objects
                while(scene3D.children.length > 0) {
                    const child = scene3D.children[0];
                    if (child.geometry) child.geometry.dispose();
                    if (child.material) {
                        if (Array.isArray(child.material)) {
                            child.material.forEach(material => material.dispose());
                        } else {
                            child.material.dispose();
                        }
                    }
                    scene3D.remove(child);
                }
                scene3D = null;
            }
        }

        // Interactive IVF Demo Function
        function demonstrateIVFSearch() {
            const searchIndicator = document.getElementById('search-indicator');
            const resultsDiv = document.getElementById('ivf-results');
            const clusterCount = parseInt(document.getElementById('cluster-search-count')?.value || 2);
            
            if (!searchIndicator || !resultsDiv) return;
            
            // Show search radius
            searchIndicator.style.opacity = '1';
            
            const searchSteps = [
                "📍 User location: Quận 1 (75, 80)",
                "📊 Calculating distances to cluster centers...",
                "🎯 Nearest clusters: Quận 1 (distance: 0), Quận 3 (distance: 105)"
            ];
            
            if (clusterCount >= 3) {
                searchSteps.push("🔍 Also searching Quận 7 (distance: 140)");
            }
            
            searchSteps.push(`⚡ Searching only ${clusterCount} clusters instead of all 5!`);
            
            const vehicles = {
                1: ["Xe 1A", "Xe 1B", "Xe 1C", "Xe 1D", "Xe 1E"],
                2: ["Xe 3A", "Xe 3B", "Xe 3C", "Xe 3D"],
                3: ["Xe 7A", "Xe 7B", "Xe 7C", "Xe 7D"],
                4: ["Xe BT1", "Xe BT2", "Xe BT3"],
                5: ["Xe 5A", "Xe 5B"]
            };
            
            resultsDiv.innerHTML = '';
            
            searchSteps.forEach((step, index) => {
                setTimeout(() => {
                    const stepEl = document.createElement('div');
                    stepEl.className = 'text-sm text-green-600 font-semibold mb-1 opacity-0 transition-opacity duration-300';
                    stepEl.textContent = step;
                    resultsDiv.appendChild(stepEl);
                    
                    setTimeout(() => {
                        stepEl.style.opacity = '1';
                    }, 100);
                }, index * 1000);
            });
            
            // Show final results
            setTimeout(() => {
                const resultEl = document.createElement('div');
                resultEl.className = 'bg-green-50 p-3 rounded-lg mt-2 border-l-4 border-green-400';
                
                let searchedVehicles = vehicles[1].length + vehicles[2].length;
                if (clusterCount >= 3) searchedVehicles += vehicles[3].length;
                
                const totalVehicles = Object.values(vehicles).reduce((sum, arr) => sum + arr.length, 0);
                const efficiency = Math.round((1 - searchedVehicles/totalVehicles) * 100);
                
                resultEl.innerHTML = `
                    <div class="font-bold text-green-700 mb-1">🎉 Kết quả tìm kiếm IVF:</div>
                    <div class="text-sm text-gray-700">
                        • Searched: ${searchedVehicles}/${totalVehicles} vehicles
                        • Efficiency: ${efficiency}% reduction
                        • Nearest: Xe 1B (distance: 1.2km)
                        • Time: ~15ms thay vì ~${totalVehicles*10}ms
                    </div>
                `;
                
                resultsDiv.appendChild(resultEl);
                
                // Highlight searched clusters
                for (let i = 1; i <= clusterCount; i++) {
                    const cluster = document.getElementById(`cluster-${i}`);
                    if (cluster) {
                        const circle = cluster.querySelector('circle');
                        if (circle) {
                            circle.style.stroke = '#22c55e';
                            circle.style.strokeWidth = '3';
                            circle.style.opacity = '0.7';
                        }
                    }
                }
                
            }, searchSteps.length * 1000 + 500);
            
            // Reset visualization after demo
            setTimeout(() => {
                searchIndicator.style.opacity = '0';
                
                // Reset cluster highlights
                for (let i = 1; i <= 5; i++) {
                    const cluster = document.getElementById(`cluster-${i}`);
                    if (cluster) {
                        const circle = cluster.querySelector('circle');
                        if (circle) {
                            circle.style.strokeWidth = '2';
                            circle.style.opacity = '0.3';
                        }
                    }
                }
            }, 8000);
        }

        // Interactive RAG Demo Functions
        function setQuickQuestion(question) {

        }

        function processRAGQuestion() {
            const question = document.getElementById('rag-user-question')?.value?.trim();
            if (!question) return;

            const processingDiv = document.getElementById('rag-processing');
            const responseDiv = document.getElementById('rag-response');
            const chunksDiv = document.getElementById('retrieved-chunks');

            // Hide previous results
            if (responseDiv) responseDiv.style.display = 'none';
            if (chunksDiv) chunksDiv.style.display = 'none';
            
            // Show processing
            if (processingDiv) processingDiv.style.display = 'block';

            const processingSteps = [
                "Embedding user question...",
                "Searching vector database...",
                "Retrieving relevant chunks...",
                "Generating response with LLM...",
                "Adding citations..."
            ];

            let stepIndex = 0;
            const processingInterval = setInterval(() => {
                const stepElement = document.getElementById('processing-step');
                if (stepElement && stepIndex < processingSteps.length) {
                    stepElement.textContent = processingSteps[stepIndex];
                    stepIndex++;
                } else {
                    clearInterval(processingInterval);
                }
            }, 400);

            // Simulate processing delay and show results
            setTimeout(() => {
                if (processingDiv) processingDiv.style.display = 'none';
                showRAGResponse(question);
            }, 2000);
        }

        function showRAGResponse(question) {
            const responseDiv = document.getElementById('rag-response');
            const chunksDiv = document.getElementById('retrieved-chunks');
            
            // Predefined responses for demo
            const responses = {
                "work from home": {
                    answer: "Theo chính sách công ty, nhân viên full-time được phép work from home tối đa 2 ngày/tuần sau khi hoàn thành 6 tháng probation period. Bạn cần gửi request approval từ line manager trước ít nhất 1 ngày và đảm bảo có stable internet connection.",
                    sources: ["Remote Work Policy v2.0, Section 4.1", "Employee Guidelines, Page 23"],
                    chunks: [
                        "Section 4.1: Remote work is permitted for full-time employees after 6-month probation period, maximum 2 days per week with manager approval.",
                        "Guidelines state employees must have reliable internet and maintain productivity standards during WFH days.",
                        "All WFH requests must be submitted at least 24 hours in advance through the company portal."
                    ],
                    timing: "1.3s",
                    confidence: "96%"
                },
                "lương tháng 13": {
                    answer: "Lương tháng 13 (13th month salary) được trả vào cuối tháng 12 hàng năm cho tất cả nhân viên full-time có ít nhất 6 tháng tenure. Mức lương tháng 13 được tính bằng 100% lương cơ bản tháng 12, không bao gồm overtime hoặc bonus.",
                    sources: ["Compensation Policy v4.2", "Payroll Guidelines 2024"],
                    chunks: [
                        "13th month salary is paid in December to all full-time employees with minimum 6 months tenure.",
                        "Calculation is based on 100% of December base salary, excluding overtime and performance bonuses.",
                        "Payment date is typically the last working day of December each year."
                    ],
                    timing: "0.9s",
                    confidence: "98%"
                },
                "nghỉ việc": {
                    answer: "Theo quy định trong hợp đồng lao động, nhân viên muốn nghỉ việc phải gửi resignation letter báo trước ít nhất 30 ngày đối với vị trí regular và 45 ngày đối với senior/management positions. Trong thời gian này, bạn cần hoàn thành handover duties và training replacement nếu có.",
                    sources: ["Employment Contract Template v3.1", "HR Policies Section 8.2"],
                    chunks: [
                        "Regular employees must provide 30 days written notice before resignation becomes effective.",
                        "Senior and management positions require 45 days notice period for proper knowledge transfer.",
                        "During notice period, employees must complete handover documentation and training activities."
                    ],
                    timing: "1.1s",
                    confidence: "94%"
                },
                "pet": {
                    answer: "Công ty hiện tại không cho phép mang pets đến workplace vì lý do health and safety regulations. Tuy nhiên, trong trường hợp đặc biệt như service animals cho người khuyết tật, có thể được xem xét theo case-by-case basis với approval từ HR department.",
                    sources: ["Workplace Safety Guidelines v2.3", "Office Policies Section 7.4"],
                    chunks: [
                        "Pets are not permitted in the workplace due to health, safety, and allergy concerns of other employees.",
                        "Service animals for employees with disabilities may be approved on case-by-case basis with proper documentation.",
                        "Exceptions require prior HR approval and compliance with local regulations."
                    ],
                    timing: "1.4s",
                    confidence: "92%"
                }
            };

            // Find matching response based on keywords
            let matchedResponse = null;
            const lowerQuestion = question.toLowerCase();
            
            for (const [key, response] of Object.entries(responses)) {
                if (lowerQuestion.includes(key) || lowerQuestion.includes(key.replace(/\s+/g, ''))) {
                    matchedResponse = response;
                    break;
                }
            }

            // Default response if no match
            if (!matchedResponse) {
                matchedResponse = {
                    answer: "Xin lỗi, tôi không tìm thấy thông tin cụ thể về câu hỏi này trong database. Bạn có thể liên hệ HR department để được hỗ trợ trực tiếp hoặc reformulate câu hỏi với từ khóa khác.",

                responseDiv.style.display = 'block';
                document.getElementById('rag-answer').innerHTML = matchedResponse.answer;
                document.getElementById('rag-sources').innerHTML = `📚 Sources: ${matchedResponse.sources.join(', ')}`;

                            </div>

                }
            }
        }
