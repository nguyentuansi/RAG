name: Deploy

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [master, main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    environment:
      name: staging
      url: https://staging.rag.example.com
    steps:
      - uses: actions/checkout@v4
      - name: Pull image
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.event.workflow_run.head_sha }}
      - name: Deploy to staging
        env:
          SSH_KEY: ${{ secrets.STAGING_SSH_KEY }}
          STAGING_HOST: ${{ secrets.STAGING_HOST }}
          IMAGE_TAG: ${{ github.event.workflow_run.head_sha }}
        run: |
          echo "$SSH_KEY" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key
          ssh -i /tmp/deploy_key -o StrictHostKeyChecking=no \
            deploy@$STAGING_HOST \
            "docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:$IMAGE_TAG && \
             docker stop rag-api || true && \
             docker run -d --rm --name rag-api \
               --env-file /opt/rag/.env.staging \
               -p 127.0.0.1:8000:8000 \
               ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:$IMAGE_TAG"
      - name: Smoke test staging
        run: |
          sleep 15
          curl -f https://staging.rag.example.com/health/live

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: deploy-staging
    environment:
      name: production
      url: https://rag.example.com
    steps:
      - name: Deploy to production
        env:
          SSH_KEY: ${{ secrets.PROD_SSH_KEY }}
          PROD_HOST: ${{ secrets.PROD_HOST }}
          IMAGE_TAG: ${{ github.event.workflow_run.head_sha }}
        run: |
          echo "$SSH_KEY" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key
          ssh -i /tmp/deploy_key -o StrictHostKeyChecking=no \
            deploy@$PROD_HOST \
            "cd /opt/rag && \
             export RAG_IMAGE_TAG=$IMAGE_TAG && \
             docker compose -f docker-compose.prod.yml pull rag-api && \
             docker compose -f docker-compose.prod.yml up -d --no-deps rag-api"
      - name: Production health check
        run: |
          sleep 30
          curl -f https://rag.example.com/health
